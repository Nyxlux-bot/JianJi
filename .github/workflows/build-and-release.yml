name: EAS Build and Release APK
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4
      - name: 2. 配置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 3. 安装 Expo 和 EAS CLI (使用秘钥)
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: 4. 安装项目依赖
        run: npm install
      - name: 5. 触发 EAS 云端打包并抓取 APK
        id: eas-build
        run: |
          echo "开始提交云端构建任务..."
          # 执行云端打包，等待完成，并以 JSON 格式输出结果
          BUILD_JSON=$(eas build --platform android --profile preview --non-interactive --json)
          
          # 使用 jq 解析出真实的 APK 下载链接
          APK_URL=$(echo $BUILD_JSON | jq -r '.[0].artifacts.buildUrl')
          echo "云端打包成功！APK 链接: $APK_URL"
          
          # 下载 APK 文件到 GitHub 虚拟机本地
          wget -O jianji-release.apk $APK_URL
      - name: 6. 自动发布到 GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: jianji-release.apk
          generate_release_notes: true
