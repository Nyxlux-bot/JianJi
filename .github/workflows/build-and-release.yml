name: Build and Release APK
on:
  push:
    tags:
      - 'v*' # 当推送 v1.0.0 这种 tag 时自动触发
  workflow_dispatch: # 允许在 GitHub 网页端手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写权限才能创建 Release

    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
      - name: 2. 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 3. 配置 Java 环境 (Android 编译依赖)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: 4. 安装项目依赖
        run: npm install
      - name: 5. 剥离并生成 Android 原生工程 (Prebuild)
        run: npx expo prebuild --platform android --clean
      - name: 6. 使用 Gradle 编译 APK 安装包
        run: |
          cd android
          ./gradlew assembleRelease
      - name: 7. 自动发布到 GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
